<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Estoque Hydra</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/estoque.css">

  <link rel="icon" href="img/logo.jpg" type="image/png" />
</head>
<body>

<div class="container">

  <header>
    <h1>📦 Controle de Estoque</h1>

    <button onclick="window.location.href='index.html'">
      ← Voltar
    </button>
  </header>

  <section class="topo">
    <input type="text" id="buscaProduto" placeholder="🔍 Buscar produto">

    <select id="categoria">

  <option value="">
    Selecione uma categoria
  </option>

  <option value="Clarificantes">
    Clarificantes
  </option>

  <option value="Algicida Manutenção">
    Algicida Manutenção
  </option>

  <option value="Algicida Choque">
    Algicida Choque
  </option>

  <option value="Outros">
    Outros
  </option>

  <option value="Pastilhas de Cloro">
    Pastilhas de Cloro
  </option>

  <option value="Cloro 1kg">
    Cloro 1kg
  </option>

  <option value="Cloro 10kg">
    Cloro 10kg
  </option>

  <option value="Equipamentos">
    Equipamentos
  </option>

  <option value="Dispositivos">
    Dispositivos
  </option>

  <option value="Motobombas">
    Motobombas
  </option>

  <option value="Filtros">
    Filtros
  </option>

</select>

    <input type="text" id="nome" placeholder="Nome do produto">

    <input type="number" id="preco" placeholder="Preço">
  </section>

  <button id="btnSalvar">
    💾 Salvar Produto
  </button>

  <section id="listaProdutos"></section>

</div>

<script src="js/estoque.js"></script>

</body>
</html>
